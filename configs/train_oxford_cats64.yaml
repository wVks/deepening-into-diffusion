seed: 42
output_dir: outputs/oxford_cats64

dataset:
  type: oxford_iiit_pet
  root: ./data
  split: trainval
  download: true

training:
  image_size: 64
  epochs: 60
  batch_size: 8
  learning_rate: 1.0e-4
  weight_decay: 1.0e-4
  grad_clip_norm: 1.0
  num_workers: 0
  save_every_epochs: 5
  sample_every_epochs: 5
  sample_grid_rows: 4
  sample_inference_steps: 50

model:
  num_train_timesteps: 1000
  beta_schedule: squaredcos_cap_v2
  channels:
    - 64
    - 128
    - 256
  layers_per_block: 2
